<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password</title>
</head>
<body style="margin:0;padding:0;background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0f172a;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
          <tr>
            <td style="text-align:center;padding-bottom:32px;">
              <span style="font-size:28px;font-weight:800;color:#818cf8;letter-spacing:-0.5px;">LeadBoost</span><span style="font-size:28px;font-weight:800;color:#f8fafc;letter-spacing:-0.5px;">AI</span>
            </td>
          </tr>
          <tr>
            <td style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:40px;">
              <table cellpadding="0" cellspacing="0" style="margin:0 auto 24px;">
                <tr>
                  <td style="background:#ef4444;border-radius:50%;width:56px;height:56px;text-align:center;vertical-align:middle;">
                    <span style="font-size:28px;line-height:56px;">🔐</span>
                  </td>
                </tr>
              </table>

              <h1 style="color:#f8fafc;font-size:24px;font-weight:700;margin:0 0 12px;text-align:center;">Reset your password</h1>

              <p style="color:#94a3b8;font-size:15px;line-height:1.7;margin:0 0 24px;text-align:center;">
                We received a request to reset the password for<br>
                <strong style="color:#f8fafc;">{{email}}</strong>
              </p>

              <table cellpadding="0" cellspacing="0" style="margin:0 auto 24px;">
                <tr>
                  <td style="background:#6366f1;border-radius:8px;">
                    <a href="{{resetUrl}}" style="display:inline-block;padding:14px 32px;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;">Reset Password →</a>
                  </td>
                </tr>
              </table>

              <p style="color:#f59e0b;font-size:13px;line-height:1.6;margin:0;padding:12px 16px;background:#1a1a2e;border:1px solid #f59e0b;border-radius:6px;text-align:center;">
                This link expires in 24 hours. If you didn't request this, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <tr>
            <td style="text-align:center;padding:32px 0 0;">
              <p style="color:#475569;font-size:12px;margin:0 0 8px;">LeadBoost AI — Never lose a lead again.</p>
              <p style="color:#334155;font-size:12px;margin:0;">© 2026 LeadBoost AI. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
